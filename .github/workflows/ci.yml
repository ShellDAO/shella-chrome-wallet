name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Node ${{ matrix.node }} · quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Checkout shell-sdk
        uses: actions/checkout@v4
        with:
          repository: ShellDAO/shell-sdk
          path: shell-sdk

      - name: Link sibling shell-sdk
        run: ln -s "$GITHUB_WORKSPACE/shell-sdk" "$GITHUB_WORKSPACE/../shell-sdk"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build production bundle
        run: npm run build:prod

      - name: Verify release metadata
        run: npm run check:release-metadata

      - name: Enforce bundle size
        run: npm run check:bundle-size
